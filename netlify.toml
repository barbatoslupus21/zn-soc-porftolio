# ─────────────────────────────────────────────────────────────────
#  Netlify configuration
# ─────────────────────────────────────────────────────────────────

[build]
  command   = "npm run build"
  publish   = "dist"

# ── Redirect HTTP → HTTPS (DDoS/MitM reduction) ─────────────────
[[redirects]]
  from   = "http://zenmier.com/*"
  to     = "https://zenmier.com/:splat"
  status = 301
  force  = true

# ── SPA fallback — serve index.html for all routes ───────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers (mirrors public/_headers — belt-and-braces) ─
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options                 = "DENY"
    X-Content-Type-Options          = "nosniff"
    X-XSS-Protection                = "1; mode=block"
    Referrer-Policy                 = "strict-origin-when-cross-origin"
    Permissions-Policy              = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), hid=(), screen-wake-lock=(), display-capture=(), interest-cohort=()"
    Cross-Origin-Opener-Policy      = "same-origin"
    Cross-Origin-Resource-Policy    = "same-site"
    Strict-Transport-Security       = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy         = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; worker-src 'self' blob:; media-src 'none'; object-src 'none'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; upgrade-insecure-requests;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/PROJECTS/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"
    Expires       = "0"
